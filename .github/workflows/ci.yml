name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native dependencies
        run: npm rebuild better-sqlite3

      - name: Verify version stamps
        run: bash scripts/verify-version-stamps.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (server)
        run: npm run test:server

      - name: Test (client)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          FAILED=0
          for f in tests/client/*.test.{ts,tsx}; do
            [ -f "$f" ] || continue
            echo "--- $(basename $f) ---"
            if ! npx vitest run --project client "$f" 2>&1 | tail -3; then
              echo "::warning::FAILED: $f"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "::error::Some client tests failed"
            exit 1
          fi
